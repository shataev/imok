name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: imok_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      JWT_SECRET: test-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-chars
      SUPABASE_URL: http://localhost:54321
      SUPABASE_SERVICE_ROLE_KEY: test-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/imok_test
      REDIS_URL: redis://localhost:6379
      FIREBASE_PROJECT_ID: test-project
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\ntest\n-----END PRIVATE KEY-----\n"
      FIREBASE_CLIENT_EMAIL: test@test.iam.gserviceaccount.com
      TWILIO_ACCOUNT_SID: ACtest
      TWILIO_AUTH_TOKEN: test
      TWILIO_FROM_NUMBER: "+10000000000"
      SENDGRID_API_KEY: SG.test
      SENDGRID_FROM_EMAIL: test@imok.app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations (test DB)
        run: |
          npm install -g pg
          for f in apps/api/migrations/*.sql; do
            psql $DATABASE_URL -f "$f"
          done

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  deploy-api-staging:
    name: Deploy API → Staging
    needs: lint-typecheck-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (staging)
        run: flyctl deploy --app imok-api-staging --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}

  deploy-api-production:
    name: Deploy API → Production
    needs: lint-typecheck-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (production)
        run: flyctl deploy --app imok-api --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PRODUCTION }}
